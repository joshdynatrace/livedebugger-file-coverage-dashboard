apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: kind
nodes:
- role: control-plane
  image: kindest/node:v1.30.0
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraMounts:
  - hostPath: /
    containerPath: /mnt/root
  extraPortMappings:
  - hostPort: 8080
    containerPort: 8080
    protocol: TCP
  - hostPort: 4317
    containerPort: 4317
  - hostPort: 4318
    containerPort: 4318
  - hostPort: 5173
    containerPort: 5173
